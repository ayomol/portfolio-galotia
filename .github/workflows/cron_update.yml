name: Actualizar Portfolio Diariamente

on:
  schedule:
    # Se ejecuta todos los días a las 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente desde GitHub si tienes prisa

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Instalar librerías necesarias
      run: |
        pip install requests beautifulsoup4

    - name: Ejecutar el script de escaneo
      run: python update_portfolio.py

    - name: Guardar cambios y subirlos al repositorio
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add .
        # 👇 Si hay cambios, hace commit, baja lo remoto reorganizando el historial y empuja de forma segura
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "Actualización automática del catálogo diario"
          git pull --rebase origin main
          git push origin main
        )
